name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC == 00:00 Asia/Shanghai (Beijing midnight)
    - cron: '0 4 * * *'    # 04:00 UTC == 12:00 Asia/Shanghai (Beijing noon)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Restore seen-state (cross-run de-dup)
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: horizon-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            horizon-seen-

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

  notify-failure:
    needs: daily-summary
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open a failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "⚠️ Horizon 运行失败 ($(date -u +%Y-%m-%dT%H:%MZ))" \
            --body "每日速递本次运行失败，请查看日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
