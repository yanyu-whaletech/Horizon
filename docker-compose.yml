services:
  # Optional one-shot runner. Scheduled production runs are handled by
  # .github/workflows/daily-summary.yml, so this container does not stay alive.
  horizon:
    build: .
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=UTC
    restart: "no"
    command: ["--hours", "24"]
